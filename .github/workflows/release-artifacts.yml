name: release-artifacts

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version string like v1.0.0
        required: true
        default: v1.0.0
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Linux build dependency
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libncurses-dev

      - name: Resolve version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "EMBER_RELEASE_VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          else
            echo "EMBER_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          fi

      - name: Build smoke-tested archive
        run: |
          chmod +x scripts/package-release.sh tests/smoke.sh
          ./tests/smoke.sh
          ./scripts/package-release.sh "$EMBER_RELEASE_VERSION"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ember-term-${{ runner.os }}-${{ runner.arch }}
          path: dist/*.tar.gz
          if-no-files-found: error
